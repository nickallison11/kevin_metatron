server {
    listen 80;
    server_name platform.metatron.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name platform.metatron.id;

    ssl_certificate /etc/letsencrypt/live/platform.metatron.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/platform.metatron.id/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # API backend
    location /api/ {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 80m;
    }

    # Auth, subscriptions, pitches, pools, profile, uploads, calls, deals, webhooks
    location ~ ^/(auth|subscriptions|pitches|pools|investments|compliance|profile|uploads|files|calls|deals|webhooks|health) {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 80m;
    }

    # Everything else → Vercel frontend
    location / {
        proxy_pass https://kevin-metatron-frontend.vercel.app;
        proxy_http_version 1.1;
        proxy_set_header Host kevin-metatron-frontend.vercel.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
